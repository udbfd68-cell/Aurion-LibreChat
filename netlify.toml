[build]
  command = "npm run build:packages && npm run build:client"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/api/*"
  to = "https://librechat-backend-qf8a.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/oauth/*"
  to = "https://librechat-backend-qf8a.onrender.com/oauth/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
