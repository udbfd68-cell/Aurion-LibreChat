# Aurion Studio — LibreChat Claude.ai Clone Configuration
# Version: 1.3.8
# Purpose: Complete MCP connectors + OAuth + Agents configuration for Claude.ai-like experience
#
# DEPLOYMENT INSTRUCTIONS:
# 1. Copy this file to your backend root as 'librechat.yaml'
# 2. Set environment variables (see .env.example)
# 3. Restart LibreChat backend
#
# For Docker: Add volume mount: -v ./librechat.yaml:/app/librechat.yaml:ro
# For Render: Set CONFIG_PATH=/app/librechat.yaml in environment variables

version: 1.3.8

cache: true

# ==========================================
# INTERFACE
# ==========================================
interface:
  customWelcome: 'Welcome to Aurion AI — All AI models, real connectors, one interface.'
  fileSearch: true
  privacyPolicy:
    externalUrl: 'https://aurion.studio/privacy'
    openNewTab: true
  termsOfService:
    externalUrl: 'https://aurion.studio/terms'
    openNewTab: true
    modalAcceptance: true
    modalTitle: 'Terms of Service for Aurion AI'
    modalContent: |
      # Terms and Conditions for Aurion AI
      
      *Effective Date: April 21, 2026*
      
      Welcome to Aurion AI, the open-source AI platform with real MCP connectors for Gmail, Drive, Calendar, Linear, and more.
      
      ## 1. MCP Connectors
      
      Aurion AI provides pre-configured MCP (Model Context Protocol) servers for popular services. These connectors require OAuth authorization before use.
      
      ## 2. Data Privacy
      
      Your data is processed according to our Privacy Policy. MCP connectors follow the privacy policies of their respective services (Google, Linear, etc.).
      
      ## 3. Usage
      
      Use Aurion AI only for lawful purposes. Prohibited behavior includes harassment, malicious content, or disrupting service.
      
      ## 4. Contact
      
      For questions, contact: support@aurion.studio
  
  modelSelect: true
  parameters: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: false
  fileCitations: true
  mcpServers:
    use: true
    create: true
    share: true
    public: false

# ==========================================
# MEMORY — Cross-conversation recall (claude.ai-style)
# ==========================================
# Persistent user memories: the memory agent reads previous & new conversations,
# extracts durable facts (preferences, context, skills) and injects them into
# every future chat. Users see/edit them in Settings → Personalization.
memory:
  disabled: false
  personalize: true
  tokenLimit: 10000
  validKeys:
    - 'preferences'
    - 'personal_info'
    - 'work_info'
    - 'skills'
    - 'interests'
    - 'context'
    - 'projects'
  agent:
    provider: 'ollama'
    model: 'gemma4:31b'
    instructions: |
      You are Aurion's memory manager. Read the full conversation history and
      persist durable, user-specific facts that will help future replies feel
      personal and context-aware (preferences, recurring topics, goals, tone,
      work context, skills, ongoing projects).
      Do NOT store secrets, credentials, one-off questions, or volatile state.
      Keep each memory concise (≤ 1 sentence), factual, first-person where
      relevant, and categorized under one of: preferences, personal_info,
      work_info, skills, interests, context, projects.
    model_parameters:
      temperature: 0.1

# ==========================================
# MCP SETTINGS — Security
# ==========================================
mcpSettings:
  allowedDomains:
