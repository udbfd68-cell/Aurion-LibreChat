    - 'api.github.com'
    - 'gitlab.com'
    - 'api.tavily.com'
    - 'api.exa.ai'
    - 'api.firecrawl.dev'
    - 'api.perplexity.ai'
    - 'api.resend.com'
    - 'api.hubapi.com'
    - 'api.notion.com'
    - 'api.linear.app'
    - 'api.todoist.com'
    - 'slack.com'
    - 'api.airtable.com'
    - 'maps.googleapis.com'
    - 'api.stripe.com'
    - 'api.openai.com'
    - 'api.anthropic.com'
    - 'openrouter.ai'
    # Vendor-official remote MCP endpoints (real OAuth)
    - 'mcp.linear.app'
    - 'mcp.notion.com'
    - 'mcp.atlassian.com'
    - 'api.githubcopilot.com'
    - 'mcp.stripe.com'
    - 'mcp.sentry.dev'
    - 'mcp.asana.com'
    - 'mcp.paypal.com'
    - 'mcp.squareup.com'
    - 'mcp.intercom.com'
    - 'docs.mcp.cloudflare.com'
    - 'mcp.vercel.com'
    - 'mcp.shopify.com'
    - 'mcp.neon.tech'
    - 'mcp.planetscale.com'
    - 'mcp.canva.com'
    - 'mcp.zapier.com'
    - 'mcp.deepwiki.com'

# ==========================================
# MCP SERVERS — Pre-configured Connectors (App-level)
# ==========================================
# These MCP servers are pre-configured at the App level.
# Users only need to click "Connect" → OAuth → Connected.
# No URLs to enter. No manual configuration required.
mcpServers:

  # ════════════════════════════════════════════════════════════════
  # REMOTE MCP — Vendor-Official OAuth (click → popup → authorize)
  # These use the MCP OAuth Dynamic Client Registration spec (RFC 7591).
  # LibreChat auto-discovers OAuth config via /.well-known/oauth-authorization-server.
  # No env vars, no client_id to provision — the vendor handles everything.
  # ════════════════════════════════════════════════════════════════

  linear-remote:
    type: streamable-http
    url: https://mcp.linear.app/sse
    startup: false
    serverInstructions: |
      Linear issues, projects, cycles, triage — OAuth linear.app officiel.

  notion-remote:
    type: streamable-http
    url: https://mcp.notion.com/mcp
    startup: false
    serverInstructions: |
      Notion pages, bases de données, blocs, commentaires — OAuth notion.com officiel.

  atlassian-remote:
    type: streamable-http
    url: https://mcp.atlassian.com/v1/sse
    startup: false
    serverInstructions: |
      Atlassian Jira + Confluence — tickets, sprints, pages — OAuth atlassian.com officiel.

  github-remote:
    type: streamable-http
    url: https://api.githubcopilot.com/mcp/
    startup: false
    serverInstructions: |
      GitHub repos, issues, PRs, actions, code search — OAuth GitHub Copilot MCP officiel.

  stripe-remote:
    type: streamable-http
    url: https://mcp.stripe.com
    startup: false
    serverInstructions: |
      Stripe paiements, clients, abonnements, factures — OAuth stripe.com officiel.

  sentry-remote:
    type: streamable-http
    url: https://mcp.sentry.dev/mcp
    startup: false
    serverInstructions: |
      Sentry tracking erreurs, monitoring, issues — OAuth sentry.io officiel.

  asana-remote:
    type: streamable-http
    url: https://mcp.asana.com/sse
    startup: false
    serverInstructions: |
      Asana tâches, projets, équipes — OAuth asana.com officiel.

  paypal-remote:
    type: streamable-http
    url: https://mcp.paypal.com/sse
    startup: false
    serverInstructions: |
      PayPal paiements, factures, transactions — OAuth paypal.com officiel.

  cloudflare-remote:
    type: streamable-http
    url: https://docs.mcp.cloudflare.com/mcp
    startup: false
    serverInstructions: |
      Cloudflare Workers, R2, KV, DNS, docs — OAuth cloudflare.com officiel.

  vercel-remote:
    type: streamable-http
    url: https://mcp.vercel.com/
    startup: false
    serverInstructions: |
      Vercel déploiements, projets, domaines, debug — OAuth vercel.com officiel.

  shopify-remote:
    type: streamable-http
    url: https://mcp.shopify.com/mcp
    startup: false
    serverInstructions: |
      Shopify produits, commandes, stock — OAuth shopify.com officiel.

  neon-remote:
    type: streamable-http
    url: https://mcp.neon.tech/sse
    startup: false
    serverInstructions: |
      Neon Postgres serverless — branches, queries — OAuth neon.tech officiel.

  intercom-remote:
    type: streamable-http
    url: https://mcp.intercom.com/sse
    startup: false
    serverInstructions: |
      Intercom chat live, tickets support — OAuth intercom.com officiel.

  zapier-remote:
    type: streamable-http
    url: https://mcp.zapier.com/api/mcp/mcp
    startup: false
    serverInstructions: |
      Zapier proxy universel — Gmail, Slack, Google Drive, Calendar, Salesforce
      et 7000+ services via une connexion zapier.com OAuth officielle.

  deepwiki-remote:
    type: streamable-http
    url: https://mcp.deepwiki.com/mcp
    startup: false
    serverInstructions: |
      DeepWiki — documentation IA pour tout repo GitHub. Sans auth.

  # ════════════════════════════════════════════════════════════════
  # LOCAL STDIO MCP — Require npx/uvx + env vars
  # ════════════════════════════════════════════════════════════════

  # ── GITHUB (via PAT — alternative à github-remote) ──
  
  github:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-github']
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: '{{GITHUB_PAT}}'
    startup: false
    serverInstructions: |
      You have access to GitHub repositories via the user's Personal Access Token.
      You can read repos, issues, PRs, commits, and manage code.
    customUserVars:
      GITHUB_PAT:
        title: 'GitHub Personal Access Token'
        description: 'Your GitHub PAT (classic) with repo, read:org scopes. Create at https://github.com/settings/tokens'
  
  # ── FILESYSTEM (local) ──
  # No OAuth required — local file access
  
  filesystem:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-filesystem', '/workspace']
    serverInstructions: |
      You have access to files in the /workspace directory.
      You can read, write, create, and delete files there.
  
  # ── BRAVE SEARCH (Web Search) ──
  # Required env var: BRAVE_API_KEY
  
  brave-search:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-brave-search']
    env:
      BRAVE_API_KEY: '{{BRAVE_API_KEY}}'
    startup: false
    serverInstructions: |
      Use Brave Search to find current information on the web.
      Use it when the user asks about recent events or needs web search.
    customUserVars:
      BRAVE_API_KEY:
        title: 'Brave Search API Key'
        description: 'Get a free key at https://api.search.brave.com/app/keys (2000 queries/month free)'

  # ── DEEP RESEARCH: TAVILY (AI-optimized web search) ──
  tavily:
    type: stdio
    command: npx
    args: ['-y', 'tavily-mcp@latest']
    env:
      TAVILY_API_KEY: '{{TAVILY_API_KEY}}'
    startup: false
    serverInstructions: |
      Tavily provides AI-optimized search with summarization.
      Prefer tavily_search for research-grade queries requiring citations.
      Use tavily_extract to fetch clean content from URLs.
    customUserVars:
      TAVILY_API_KEY:
        title: 'Tavily API Key'
        description: 'Free 1000 searches/month at https://tavily.com'

  # ── DEEP RESEARCH: EXA (neural web search + content extraction) ──
  exa:
    type: stdio
    command: npx
    args: ['-y', 'exa-mcp-server']
    env:
      EXA_API_KEY: '{{EXA_API_KEY}}'
    startup: false
    serverInstructions: |
      Exa performs neural semantic search and retrieves full page content.
      Use web_search_exa, research_paper_search, or company_research for deep research.
    customUserVars:
      EXA_API_KEY:
        title: 'Exa API Key'
        description: 'Get a key at https://dashboard.exa.ai/api-keys (1000 req/month free)'

  # ── DEEP RESEARCH: FIRECRAWL (web scraping + crawling) ──
  firecrawl:
    type: stdio
    command: npx
    args: ['-y', 'firecrawl-mcp']
    env:
      FIRECRAWL_API_KEY: '{{FIRECRAWL_API_KEY}}'
    startup: false
    serverInstructions: |
      Firecrawl turns websites into structured markdown/JSON at scale.
      Use firecrawl_scrape for single pages and firecrawl_crawl for entire sites.
    customUserVars:
      FIRECRAWL_API_KEY:
        title: 'Firecrawl API Key'
        description: 'Get at https://www.firecrawl.dev (free tier 500 credits)'

  # ── DEEP RESEARCH: PERPLEXITY ASK ──
  perplexity:
    type: stdio
    command: npx
    args: ['-y', 'server-perplexity-ask']
    env:
      PERPLEXITY_API_KEY: '{{PERPLEXITY_API_KEY}}'
    startup: false
    serverInstructions: |
      Perplexity provides instant web-searched answers with citations.
      Use for quick factual questions requiring up-to-date info.
    customUserVars:
      PERPLEXITY_API_KEY:
        title: 'Perplexity API Key'
        description: 'Get at https://www.perplexity.ai/settings/api'

  # ── EMAIL: RESEND (transactional email) ──
  resend:
    type: stdio
    command: npx
    args: ['-y', 'mcp-send-email']
    env:
      RESEND_API_KEY: '{{RESEND_API_KEY}}'
      SENDER_EMAIL_ADDRESS: '{{SENDER_EMAIL_ADDRESS}}'
    startup: false
    serverInstructions: |
      Send real transactional emails via Resend.
      Always confirm recipient, subject, body with user before sending.
      Tool: send_email(to, subject, text, html?).
    customUserVars:
      RESEND_API_KEY:
        title: 'Resend API Key'
        description: 'Free 3000 emails/month at https://resend.com (format: re_xxx)'
      SENDER_EMAIL_ADDRESS:
        title: 'Sender Email Address'
        description: 'Verified sender email. Use onboarding@resend.dev for testing.'

  # ── CRM: HUBSPOT (prospects, contacts, deals) ──
  hubspot:
    type: stdio
    command: npx
    args: ['-y', '@hubspot/mcp-server']
    env:
      PRIVATE_APP_ACCESS_TOKEN: '{{HUBSPOT_ACCESS_TOKEN}}'
    startup: false
    serverInstructions: |
      Full HubSpot CRM access: contacts, companies, deals, tickets, pipelines.
      Create prospects, update deals, manage pipelines.
    customUserVars:
      HUBSPOT_ACCESS_TOKEN:
        title: 'HubSpot Private App Access Token'
        description: 'Create at https://app.hubspot.com/settings/integrations/private-apps'

  # ── DOCS: NOTION ──
  notion:
    type: stdio
    command: npx
    args: ['-y', '@notionhq/notion-mcp-server']
    env:
      OPENAPI_MCP_HEADERS: '{"Authorization": "Bearer {{NOTION_API_KEY}}", "Notion-Version": "2022-06-28"}'
    startup: false
    serverInstructions: |
      Read, create, update Notion pages, databases, blocks.
      Use for documentation, meeting notes, project tracking.
    customUserVars:
      NOTION_API_KEY:
        title: 'Notion Integration Token'
        description: 'Create at https://www.notion.so/my-integrations (format: secret_xxx or ntn_xxx)'

  # ── TASKS: LINEAR (issues, projects, cycles) ──
  linear:
    type: stdio
    command: npx
    args: ['-y', 'linear-mcp-server']
    env:
      LINEAR_API_KEY: '{{LINEAR_API_KEY}}'
    startup: false
    serverInstructions: |
      Create and manage Linear issues, cycles, projects.
      Great for triaging bugs and prospect follow-ups.
    customUserVars:
      LINEAR_API_KEY:
        title: 'Linear API Key'
        description: 'Personal API key from https://linear.app/settings/api'

  # ── TASKS: TODOIST ──
  todoist:
    type: stdio
    command: npx
    args: ['-y', '@abhiz123/todoist-mcp-server']
    env:
      TODOIST_API_TOKEN: '{{TODOIST_API_TOKEN}}'
    startup: false
    serverInstructions: |
      Manage Todoist tasks, projects, labels.
    customUserVars:
      TODOIST_API_TOKEN:
        title: 'Todoist API Token'
        description: 'Get at https://todoist.com/app/settings/integrations/developer'

  # ── DEV: GITLAB ──
  gitlab:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-gitlab']
    env:
      GITLAB_PERSONAL_ACCESS_TOKEN: '{{GITLAB_PAT}}'
      GITLAB_API_URL: 'https://gitlab.com/api/v4'
    startup: false
    serverInstructions: |
      GitLab repo access via PAT.
    customUserVars:
      GITLAB_PAT:
        title: 'GitLab Personal Access Token'
        description: 'Create at https://gitlab.com/-/profile/personal_access_tokens (api scope)'

  # ── COMMUNICATION: SLACK ──
  slack:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-slack']
    env:
      SLACK_BOT_TOKEN: '{{SLACK_BOT_TOKEN}}'
      SLACK_TEAM_ID: '{{SLACK_TEAM_ID}}'
    startup: false
    serverInstructions: |
      Send messages, search Slack channels and threads.
    customUserVars:
      SLACK_BOT_TOKEN:
        title: 'Slack Bot Token'
        description: 'xoxb-... token from your Slack app OAuth page'
      SLACK_TEAM_ID:
        title: 'Slack Team ID'
        description: 'T... ID of your Slack workspace'

  # ── DATA: AIRTABLE ──
  airtable:
    type: stdio
    command: npx
    args: ['-y', 'airtable-mcp-server']
    env:
      AIRTABLE_API_KEY: '{{AIRTABLE_API_KEY}}'
    startup: false
    serverInstructions: |
      Read/write any Airtable base. Perfect for prospect lists and pipelines.
    customUserVars:
      AIRTABLE_API_KEY:
        title: 'Airtable Personal Access Token'
        description: 'Create at https://airtable.com/create/tokens (scopes: data.records:read/write)'

  # ── DATA: POSTGRES (any PG database) ──
  postgres:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-postgres', '{{POSTGRES_URL}}']
    startup: false
    serverInstructions: |
      Read-only SQL access to a Postgres database.
      Use for querying user-provided databases safely.
    customUserVars:
      POSTGRES_URL:
        title: 'Postgres Connection URL'
        description: 'postgres://user:pass@host:5432/dbname'

  # ── MAPS: GOOGLE MAPS ──
  google-maps:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-google-maps']
    env:
      GOOGLE_MAPS_API_KEY: '{{GOOGLE_MAPS_API_KEY}}'
    startup: false
    serverInstructions: |
      Geocoding, directions, places search, distance matrix.
    customUserVars:
      GOOGLE_MAPS_API_KEY:
        title: 'Google Maps API Key'
        description: 'Create at https://console.cloud.google.com/apis/credentials'

  # ── FINANCE: STRIPE ──
  stripe:
    type: stdio
    command: npx
    args: ['-y', '@stripe/mcp', '--tools=all']
    env:
      STRIPE_API_KEY: '{{STRIPE_SECRET_KEY}}'
    startup: false
    serverInstructions: |
      Full Stripe API: customers, invoices, payments, subscriptions.
      USE TEST MODE keys (sk_test_...) unless confirmed production.
    customUserVars:
      STRIPE_SECRET_KEY:
        title: 'Stripe Secret Key'
        description: 'sk_test_... or sk_live_... from https://dashboard.stripe.com/apikeys'

  # ── BROWSER: PUPPETEER (automation, screenshots, scraping) ──
  puppeteer:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-puppeteer']
    startup: false
    serverInstructions: |
      Browser automation: navigate, click, fill, screenshot, extract HTML.
      Use for scraping pages that require JS or interaction.

  # ── BROWSER: PLAYWRIGHT MCP (Microsoft — real "computer-use" for any LLM) ──
  # 31k+ stars. Uses Playwright's accessibility tree (NOT vision), works with
  # any model including Ollama/gemma/local models. Deterministic, fast, no
  # screenshots needed for the LLM to understand the page.
  #
  # This IS the real computer-use equivalent for non-Anthropic models.
  playwright:
    type: stdio
    command: npx
    args: ['-y', '@playwright/mcp@latest', '--isolated', '--headless', '--no-sandbox']
    startup: false
    serverInstructions: |
      Model-agnostic browser automation using accessibility snapshots.
      No vision/screenshots needed — the agent reads the page's semantic tree.
      Tools: browser_navigate, browser_click, browser_type, browser_snapshot,
      browser_select_option, browser_press_key, browser_wait_for, browser_evaluate,
      browser_tab_new, browser_tab_close, browser_file_upload, etc.
      PREFER this over puppeteer for reliability. Each session is isolated
      (no cookie leak between users). Works on LinkedIn, Crunchbase, any SPA.

  # ── BROWSER: STAGEHAND (agentic "computer use" — goal-driven navigation) ──
  # High-level primitives: act(goal), observe(goal), extract(schema). Uses
  # Browserbase hosted Chrome or local fallback. Ideal for prospection,
  # LinkedIn, form filling, multi-step workflows that puppeteer can't handle.
  stagehand:
    type: stdio
    command: npx
    args: ['-y', '@browserbasehq/mcp-server-browserbase']
    startup: false
    serverInstructions: |
      Agentic browser automation. Prefer over puppeteer for:
        - multi-step workflows ("login, search, click the 3rd result, extract email")
        - prospection / lead generation on LinkedIn, Crunchbase, company sites
        - any task where the target DOM is not known in advance.
      Tools: stagehand_navigate, stagehand_act, stagehand_observe, stagehand_extract.
      ALWAYS call multi_browserbase_stagehand_session_create FIRST and include
      the full debuggerUrl / sessionUrl in your reply text. The UI renders it
      as a live iframe so the user can watch the browser in real-time.
    customUserVars:
      BROWSERBASE_API_KEY:
        title: 'Browserbase API Key'
        description: 'Get free key (3000 min/month) at https://browserbase.com → Settings → API Keys'
      BROWSERBASE_PROJECT_ID:
        title: 'Browserbase Project ID'
        description: 'Browserbase dashboard → Project Settings'

  # ── REASONING: SEQUENTIAL THINKING (step-by-step problem solving) ──
  sequential-thinking:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-sequential-thinking']
    startup: false
    serverInstructions: |
      Use sequential_thinking for complex multi-step reasoning tasks.
      Ideal for planning, debugging, analysis that needs many steps.

  # ── MEMORY: KNOWLEDGE GRAPH (persist facts across conversation) ──
  memory:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-memory']
    startup: false
    serverInstructions: |
      Persist facts, relationships, and entities across the conversation.
      Use create_entities, create_relations, search_nodes.

  # ── UTIL: FETCH (fetch any URL as clean markdown) ──
  fetch:
    type: stdio
    command: uvx
    args: ['mcp-server-fetch']
    startup: false
    serverInstructions: |
      Fetch any URL and return clean markdown. Use when the user gives
      an explicit URL to read.

  # ── UTIL: TIME (timezones, conversions) ──
  time:
    type: stdio
    command: uvx
    args: ['mcp-server-time']
    startup: false
    serverInstructions: |
      Get current time in any timezone, convert between timezones.

  # ── DEV: GIT (local repository operations) ──
  git:
    type: stdio
    command: uvx
    args: ['mcp-server-git', '--repository', '/workspace']
    startup: false
    serverInstructions: |
      Read git history, diffs, branches, and commits for /workspace.

  # ── DATA: SQLITE (local DB file) ──
  sqlite:
    type: stdio
    command: uvx
    args: ['mcp-server-sqlite', '--db-path', '/workspace/data/database.db']
    startup: false
    serverInstructions: |
      Read/write a local SQLite database.

  # ── DATA: MONGODB ──
  mongodb:
    type: stdio
    command: npx
    args: ['-y', 'mongodb-mcp-server']
    env:
      MDB_MCP_CONNECTION_STRING: '{{MONGODB_URI}}'
    startup: false
    serverInstructions: |
      Read/write a MongoDB database. Collections, documents, indexes.
    customUserVars:
      MONGODB_URI:
        title: 'MongoDB Connection URI'
        description: 'mongodb+srv://user:pass@cluster.mongodb.net/db'

  # ── DATA: SUPABASE (DB + auth + edge functions + storage) ──
  supabase:
    type: stdio
    command: npx
    args: ['-y', '@supabase/mcp-server-supabase@latest', '--access-token', '{{SUPABASE_ACCESS_TOKEN}}']
    startup: false
