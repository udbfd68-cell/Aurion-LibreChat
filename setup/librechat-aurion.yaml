# Aurion Studio — LibreChat Claude.ai Clone Configuration
# Version: 1.3.8
# Purpose: Complete MCP connectors + OAuth + Agents configuration for Claude.ai-like experience
#
# DEPLOYMENT INSTRUCTIONS:
# 1. Copy this file to your backend root as 'librechat.yaml'
# 2. Set environment variables (see .env.example)
# 3. Restart LibreChat backend
#
# For Docker: Add volume mount: -v ./librechat.yaml:/app/librechat.yaml:ro
# For Render: Set CONFIG_PATH=/app/librechat.yaml in environment variables

version: 1.3.8

cache: true

# ==========================================
# INTERFACE
# ==========================================
interface:
  customWelcome: 'Welcome to Aurion AI — All AI models, real connectors, one interface.'
  fileSearch: true
  privacyPolicy:
    externalUrl: 'https://aurion.studio/privacy'
    openNewTab: true
  termsOfService:
    externalUrl: 'https://aurion.studio/terms'
    openNewTab: true
    modalAcceptance: true
    modalTitle: 'Terms of Service for Aurion AI'
    modalContent: |
      # Terms and Conditions for Aurion AI
      
      *Effective Date: April 21, 2026*
      
      Welcome to Aurion AI, the open-source AI platform with real MCP connectors for Gmail, Drive, Calendar, Linear, and more.
      
      ## 1. MCP Connectors
      
      Aurion AI provides pre-configured MCP (Model Context Protocol) servers for popular services. These connectors require OAuth authorization before use.
      
      ## 2. Data Privacy
      
      Your data is processed according to our Privacy Policy. MCP connectors follow the privacy policies of their respective services (Google, Linear, etc.).
      
      ## 3. Usage
      
      Use Aurion AI only for lawful purposes. Prohibited behavior includes harassment, malicious content, or disrupting service.
      
      ## 4. Contact
      
      For questions, contact: support@aurion.studio
  
  modelSelect: true
  parameters: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: false
  fileCitations: true
  mcpServers:
    use: true
    create: false
    share: false
    public: false

# ==========================================
# MCP SETTINGS — Security
# ==========================================
mcpSettings:
  allowedDomains:
    - 'gmailmcp.googleapis.com'
    - 'drivemcp.googleapis.com'
    - 'calendarmcp.googleapis.com'
    - 'mcp.linear.app'
    - 'api.githubcopilot.com'
    - 'mcp.slack.com'
    - 'mcp.notion.com'
    - 'api.anthropic.com'
    - 'api.openai.com'
    - 'openrouter.ai'

# ==========================================
# MCP SERVERS — Pre-configured Connectors (App-level)
# ==========================================
# These MCP servers are pre-configured at the App level.
# Users only need to click "Connect" → OAuth → Connected.
# No URLs to enter. No manual configuration required.
mcpServers:
  
  # ── GOOGLE SERVICES ──
  # All Google services use the SAME OAuth app (one Google Cloud Project)
  # Required env vars: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, LIBRECHAT_URL
  
  
  
  
  # ── LINEAR ──
  # Required env vars: LINEAR_CLIENT_ID, LINEAR_CLIENT_SECRET, LIBRECHAT_URL
  
  
  # ── GITHUB (via PAT) ──
  # No OAuth required — user enters their Personal Access Token
  # This is simpler for GitHub than OAuth for self-hosted setups
  
  github:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-github']
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: '{{GITHUB_PAT}}'
    startup: false
    serverInstructions: |
      You have access to GitHub repositories via the user's Personal Access Token.
      You can read repos, issues, PRs, commits, and manage code.
    customUserVars:
      GITHUB_PAT:
        title: 'GitHub Personal Access Token'
        description: 'Your GitHub PAT (classic) with repo, read:org scopes. Create at https://github.com/settings/tokens'
  
  # ── FILESYSTEM (local) ──
  # No OAuth required — local file access
  
  filesystem:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-filesystem', '/workspace']
    serverInstructions: |
      You have access to files in the /workspace directory.
      You can read, write, create, and delete files there.
  
  # ── BRAVE SEARCH (Web Search) ──
  # Required env var: BRAVE_API_KEY
  
  brave-search:
    type: stdio
    command: npx
    args: ['-y', '@modelcontextprotocol/server-brave-search']
    env:
      BRAVE_API_KEY: '${BRAVE_API_KEY}'
    serverInstructions: |
      Use Brave Search to find current information on the web.
      Use it when the user asks about recent events or needs web search.

# ==========================================
# AGENTS — Global Configuration
# ==========================================
agents:
  artifacts: true
  recursiveRun: true

# ==========================================
# ENDPOINTS — LLM Providers
# ==========================================
endpoints:

  # ── ANTHROPIC ──
  # Disabled - using Ollama Cloud only
  # Required: ANTHROPIC_API_KEY

  # anthropic:
  #   apiKey: ${ANTHROPIC_API_KEY}
  #   models:
  #     default: [claude-opus-4-6, claude-sonnet-4-6, claude-3.5-sonnet]
  #     fetch: false
  #   titleConvo: true
  #   titleModel: 'claude-3.5-sonnet'

  # ── OPENAI ──
  # Disabled - using Ollama Cloud only
  # Required: OPENAI_API_KEY

  # openAI:
  #   apiKey: ${OPENAI_API_KEY}
  #   models:
  #     default: [gpt-4o, gpt-4o-mini]
  #     fetch: true

  # ── OLLAMA CLOUD ──
  # Required: OLLAMA_API_KEY
  # Single model: gemma4:31b

  custom:
    - name: 'Aurion'
      apiKey: ${OLLAMA_API_KEY}
      baseURL: 'https://ollama.com/v1'
      models:
        default: ['gemma4:31b']
        fetch: false
      titleConvo: true
  
  # ── AGENTS ENDPOINT ──
  # For Agent Builder and Agent execution

  agents:
    type: 'agents'
    disableBuilder: false
    order: 1
    models: ['gemma4:31b']
    capabilities: [tools, actions, execute_code, file_search]

# ==========================================
# ACTIONS — Domain Restrictions (SSRF Protection)
# ==========================================
actions:
  allowedDomains:
    - 'api.github.com'
    - 'api.openai.com'
    - 'api.anthropic.com'
    - 'openrouter.ai'
    - 'ollama.com'
    - 'gmail.googleapis.com'
    - 'www.googleapis.com'
    - 'linear.app'
    - 'api.linear.app'
